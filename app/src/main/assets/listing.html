<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{appname}} - Shared Files</title>
    <link rel = "icon" type = "image/png" href = "/{{token}}/favicon">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        a { text-decoration: none; }
        a:hover { text-decoration: underline; }


        header {
            display: flex;
            gap: 16px;
            flex-direction: row;
            align-items: center;
            justify-content: left;
        }

        footer {
            margin-top: 48px;
            font-size: 1rem;
            text-align: center;
            color: #888;
        }

        header img {
            max-width: 48px;
        }

        button { margin-left: 10px; }

        .grid {
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
        }

        .grid .file {
          flex: none;
          background-color: #f0f0f0;
          padding: 20px;
          border: 1px solid #ccc;
          text-align: center;
          box-sizing: border-box;
          width: 250px;
          height: 250px;
          min-width: 0;

          display: flex;
          flex-direction: column;
          gap: 10px;
        }

        .grid .file img {
          width: 100%;
          object-fit: cover;  // contain
          flex-grow: 1;
          flex-shrink: 1;
          min-height: 0;
          border-radius: 16px;
          max-height: 132px;
          display: block;
          margin: auto;
        }
        .grid .file img.icon {
          object-fit: contain;
          max-height: 100px;
        }

        .grid .image-wrapper {
          flex-grow: 1;      /* Nimmt den gesamten Platz über dem Text ein */
          display: flex;
          align-items: center;    /* Zentriert vertikal */
          justify-content: center; /* Zentriert horizontal */
          overflow: hidden;
          margin-bottom: 10px;
        }

        .grid .file span.filename {
          margin-top: auto;
          font-weight: bold;
        }

        .grid .file span {
          display: block;
          font-size: 0.8rem;
          width: 100%;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          flex-grow: 0;
          flex-shrink: 0;
        }

        .grid .file span.size {
          display: none !important;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list .file {
            background-color: #f0f0f0;
            display: flex;
            flex-direction: row;
            gap: 10px;
            flex-grow: 0;
            flex-shrink: 0;

            border: 1px solid #ccc;
            padding: 10px;
        }

        .list .file .image-wrapper {
            flex-grow: 0;
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            overflow: hidden;
        }

        .list .file .image-wrapper img {
            width: 100%;
            object-fit: contain;
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 0;
            max-height: 32px;
            max-width: 32px;
            display: block;
            margin: auto;
        }

        .list .file span.filename {
            flex-grow: 1;

          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .list .file span {
            margin: auto;
        }

        #toolbar {
            border: 1px solid #ccc;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            flex-direction: row;
            align-items: center;
            margin-bottom: 24px;
            background-color: #f0f0f0;
        }

        #toolbar .buttons-container {

        }

    </style>
    <script lang="javascript">
        const fileItems = {{filelist}}
        const token = {{token}}

        let orderBy = "filename"  // filename, size
        let orderAsc = true
        let displayList = false

        function humanFileSize(bytes, si=false, dp=1) {
          const thresh = si ? 1000 : 1024;

          if (Math.abs(bytes) < thresh) {
            return bytes + ' B';
          }

          const units = ['kB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB']

          let u = -1;
          const r = 10**dp;

          do {
            bytes /= thresh;
            ++u;
          } while (Math.round(Math.abs(bytes) * r) / r >= thresh && u < units.length - 1);


          return bytes.toFixed(dp) + ' ' + units[u];
        }

        function cmpFunc(a, b) {
            if (typeof a[orderBy] === "string" && typeof b[orderBy] === "string") {
                return a[orderBy].localeCompare(b[orderBy])
            }
            else if (typeof a[orderBy] === "number" && typeof b[orderBy] === "number") {
                return a[orderBy] - b[orderBy]
            }
            else {
                return 0
            }
        }

        function toggleOrder() {
            orderAsc = !orderAsc
            const orderButton = document.getElementById("toggle-order-button")
            if (orderButton) {
                orderButton.innerHTML = orderAsc ? "&#8595;" : "&#8593;"
            }
            generatePage()
        }

        function toggleView() {
            const fileContainer = document.getElementById("file-container")
            const toggleButton = document.getElementById("toggle-view")

            if (displayList) {
                fileContainer.classList.remove("list")
                fileContainer.classList.add("grid")
                toggleButton.innerHTML = "List"
                displayList = false
            } else {
                fileContainer.classList.remove("grid")
                fileContainer.classList.add("list")
                toggleButton.innerHTML = "Grid"
                displayList = true
            }
        }

        function generatePage() {
            const fileContainer = document.getElementById("file-container")

            if (!fileContainer) {
                console.log("File container not found")
                return
            }

            fileContainer.innerHTML = ""
            items = fileItems.slice()
            items.sort(cmpFunc)
            if (!orderAsc) {
                items.reverse()
            }
            items.forEach(item => {
                console.log(item)

                const fileDiv = document.createElement("div")
                fileDiv.classList.add("file")

                let imgSrc = `/${token}/icon/${item["icon"]}`
                if (!displayList && item["hasThumbnail"]) {
                    imgSrc = `/${token}/thumbnail/${item["fileId"]}`
                }

                fileDiv.innerHTML = `<div class="image-wrapper">
                   <img src="${imgSrc}" class="${item["hasThumbnail"] || "icon"}" />
                </div>
                <span class="filename">${item["filename"]}</span>
                <span class="size">${humanFileSize(item["size"])}</span>
                <span>
                    <a href="/${token}/download/${item["fileId"]}"><button>Download</button></a>
                    <a href="/${token}/stream/${item["fileId"]}"><button>Open</button></a>
                </span>`

                fileContainer.appendChild(fileDiv)

            })
        }
    </script>
</head>
<body>
<header>
    <img src="/{{token}}/favicon" alt="Logo" />
    <h1>{{appname}} - Shared Files</h1>
</header>
<div id="toolbar" hidden>
        <span class="buttons-container">
            <select id="order-by" onchange="orderBy = this.value; generatePage()">
                <option value="filename" selected>Filename</option>
                <option value="size">Size</option>
                <option value="mimeType">MIME Type</option>
            </select>
            <button id="toggle-order-button" onclick="toggleOrder(); generatePage()">&#8595;</button>
            <button id="toggle-view" onclick="toggleView(); generatePage()">List</button>
        </span>
    <span class="download-button-container">
            <a href="/{{token}}/download"><button>Download All (as ZIP)</button></a>
        </span>
</div>

<div id="file-container" class="grid">
    <noscript>{{noscript}}</noscript>
</div>

<script lang="javascript">
    const toolbar = document.getElementById("toolbar")
    if (toolbar) {
        toolbar.hidden = false
    }
    generatePage()
</script>

<footer>
    <p>Generated by <a href="{{appurl}}">{{appname}}</a>.</p>
    <p>Icons provided by <a href="https://github.com/PapirusDevelopmentTeam/papirus-icon-theme" target="_blank">Papirus Development Team</a>.</p>
</footer>
</body>
</html>
