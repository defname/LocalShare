<!DOCTYPE html>
<html lang="en"
      x-data="{
        darkMode: localStorage.getItem('dark') === 'true' ||
                 (!('dark' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
      }"
      :class="{ 'dark': darkMode }"
      class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{appname}} - Shared Files</title>
    <link rel="icon" type="image/png" href="/{{token}}/favicon">
    <link rel="stylesheet" href="/{{token}}/static/css/tailwind.css">

    <script defer src="/{{token}}/static/js/alpine.min.js"></script>
    <script src="/{{token}}/static/js/main.js"></script>

    <script>
        window.initialFiles = {{filelist}};
        window.token = '{{token}}';
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-950 dark:text-gray-100 font-sans transition-colors duration-300">
<!-- Sidebar classes for Tailwind -->
<div class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm">
    <div class="fixed inset-y-0 left-0 w-3/4 min-w-[320px] bg-slate-900 border-r border-slate-800 flex flex-col shadow-2xl transform translate-x-0 -translate-x-full transition-transform duration-300">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-xl font-bold text-white">Sidebar</h2>
            <div class="text-gray-400 hover:text-white"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 relative group">
                <div class="flex items-start justify-between mb-2">
                    <div class="flex flex-col gap-0.5">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] uppercase font-bold tracking-wider text-blue-500">text/plain</span>
                            <span class="text-[10px] font-bold text-gray-500 dark:text-gray-400">Label</span>
                        </div>
                    </div>
                </div>
                <p class="text-sm text-gray-800 dark:text-gray-200 break-words whitespace-pre-wrap">Content</p>
                <pre class="text-xs text-gray-700 dark:text-gray-300 bg-white/50 dark:bg-slate-900/50 p-2 rounded border border-gray-100 dark:border-slate-800 overflow-x-auto font-mono whitespace-pre-wrap">Fallback</pre>
            </div>
        </div>
    </div>
</div>

<div class="min-h-[60vh] rounded-3xl min-h-[400px] md:p-12 p-12 shadow-xl bg-slate-900/50 rounded-lg dark:bg-slate-900 dark:border-slate-800 dark:text-white dark:hover:text-white dark:bg-slate-900/50 dark:bg-slate-800 dark:border-slate-700 dark:hover:bg-slate-700 shadow-blue-500/20"></div>

<header class="p-6 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <img src="/{{token}}/favicon/medium" alt="Logo" class="w-10 h-10" />
        <h1 class="text-xl font-bold text-gray-800 dark:text-white">{{appname}}</h1>
    </div>

    <button @click="darkMode = !darkMode; localStorage.setItem('dark', darkMode)"
            class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none cursor-pointer">
        <svg x-show="darkMode" class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
        </svg>
        <svg x-show="!darkMode" class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>
</header>

</body>
</html>
