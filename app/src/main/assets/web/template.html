<!DOCTYPE html>
<html lang="en"
      x-data="{
        darkMode: localStorage.getItem('dark') === 'true' ||
                 (!('dark' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
      }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{appname}} - Shared Files</title>
    <link rel="icon" type="image/png" href="/{{token}}/favicon">
    <link rel="stylesheet" href="/{{token}}/static/css/tailwind.css">

    <script defer src="/{{token}}/static/js/alpine.min.js"></script>
    <script src="/{{token}}/static/js/main.js"></script>

    <script>
        window.initialFiles = {{filelist}};
        window.token = '{{token}}';
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-950 dark:text-gray-100 font-sans transition-colors duration-300">

<header class="p-6 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <img src="/{{token}}/favicon/medium" alt="Logo" class="w-10 h-10" />
        <h1 class="text-xl font-bold text-gray-800 dark:text-white">{{appname}}</h1>
    </div>

    <button @click="darkMode = !darkMode; localStorage.setItem('dark', darkMode)"
            class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none cursor-pointer">
        <svg x-show="darkMode" class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
        </svg>
        <svg x-show="!darkMode" class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>
</header>

<div x-data="fileManager(window.initialFiles, window.token)"
     x-init="initSSE()"
     @keydown.window.left="isSlideshow && prevSlide()"
     @keydown.window.right="isSlideshow && nextSlide()"
     class="max-w-6xl mx-auto p-4">

    <div class="flex flex-wrap justify-between items-center mb-8 gap-4 bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800">
        <div class="flex items-center gap-2">
            <select x-model="sortKey" class="bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-sm rounded-lg p-2 focus:ring-blue-500 dark:text-white">
                <option value="filename">Filename</option>
                <option value="size">Size</option>
                <option value="mimeType">Type</option>
            </select>
            <button @click="sortAsc = !sortAsc" class="p-2 bg-gray-100 dark:bg-slate-800 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 transition">
                <span x-text="sortAsc ? '↓' : '↑'" class="dark:text-white"></span>
            </button>
            <div class="h-6 w-px bg-gray-200 dark:bg-slate-700 mx-2"></div>
            <button @click="showGrid()" :class="isGrid ? 'text-blue-600 bg-blue-50 dark:bg-blue-900/40' : 'text-gray-500'" class="p-2 rounded-lg font-medium cursor-pointer">Grid</button>
            <button @click="showList()" :class="isList ? 'text-blue-600 bg-blue-50 dark:bg-blue-900/40' : 'text-gray-500'" class="p-2 rounded-lg font-medium cursor-pointer">List</button>
            <button @click="toggleSlideshow()" :class="isSlideshow ? 'text-blue-600 bg-blue-50 dark:bg-blue-900/40' : 'text-gray-500'" class="p-2 rounded-lg font-medium cursor-pointer">Slide</button>
        </div>

        <a x-show="files.length > 0" :href="'/' + window.token + '/?download'" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-500/20">
            Download All (ZIP)
        </a>
    </div>

    <!-- Grid & List Views -->
    <ul x-show="!isSlideshow" :class="isGrid ? 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6' : 'flex flex-col space-y-3'" class="list-none p-0">
        <template x-for="(file, index) in sortedFiles" :key="file.fileId">
            <li :class="isGrid ? 'bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden flex flex-col' : 'bg-white dark:bg-slate-900 p-3 rounded-xl border border-gray-100 dark:border-slate-800 flex items-center justify-between shadow-sm'">

                <div :class="isGrid ? 'contents' : 'flex items-center gap-4 w-full'">
                    <div @click="currentIndex = index; toggleSlideshow()"
                         :class="isGrid ? 'h-40 bg-gray-100 dark:bg-slate-800 flex items-center justify-center cursor-pointer group' : 'w-12 h-12 bg-gray-100 dark:bg-slate-800 rounded-lg flex-shrink-0 flex items-center justify-center cursor-pointer group'">
                        <template x-if="file.hasThumbnail">
                            <img :src="'/' + window.token + '/thumbnail/' + file.fileId" class="object-cover w-full h-full group-hover:opacity-90 transition" />
                        </template>
                        <template x-if="!file.hasThumbnail">
                            <img :src="'/' + window.token + '/icon/' + file.icon"
                                 :class="isGrid ? 'w-20 h-20 p-2' : 'w-8 h-8'"
                                 class="object-contain group-hover:scale-110 transition" />
                        </template>
                    </div>

                    <div :class="isGrid ? 'p-4 flex flex-col flex-grow items-center text-center' : 'flex-grow grid grid-cols-2 md:grid-cols-4 items-center px-2'">
                        <span x-text="file.filename" :title="file.filename" class="font-bold text-gray-900 dark:text-white truncate block w-full"></span>
                        <span x-text="humanFileSize(file.size)" class="text-xs text-gray-500 dark:text-slate-400 font-mono"></span>

                        <div class="mt-3 flex gap-2" :class="isGrid ? 'mt-auto justify-center' : 'justify-end col-span-2 mt-0'">
                            <button @click="copyLink(file.fileId)"
                                    class="bg-gray-100 dark:bg-slate-800 text-gray-700 dark:text-gray-300 p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 transition cursor-pointer"
                                    title="Copy Link">
                                <svg x-show="copiedId !== file.fileId" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                                </svg>
                                <svg x-show="copiedId === file.fileId" class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </button>
                            <a :href="'/' + window.token + '/file/' + file.fileId + '?download'" class="text-[10px] uppercase tracking-wider bg-gray-100 dark:bg-slate-800 text-gray-700 dark:text-gray-300 px-3 py-1.5 rounded-lg font-bold hover:bg-gray-200 dark:hover:bg-slate-700 transition">Get</a>
                            <a :href="'/' + window.token + '/file/' + file.fileId" class="text-[10px] uppercase tracking-wider bg-blue-600 text-white px-3 py-1.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-md shadow-blue-500/10">Open</a>
                        </div>
                    </div>
                </div>
            </li>
        </template>
    </ul>

    <!-- Slideshow View -->
    <template x-if="currentFile?.icon">
        <div x-show="isSlideshow"
             class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-gray-100 dark:border-slate-800 overflow-hidden flex flex-col min-h-[60vh]">

            <!-- Slideshow Header -->
            <div class="p-4 border-b border-gray-100 dark:border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span x-text="(currentIndex + 1) + ' / ' + (sortedFiles?.length || 0)" class="text-sm font-mono text-gray-400"></span>
                    <span x-text="currentFile?.filename" class="font-bold text-gray-900 dark:text-white truncate max-w-xs md:max-w-xl"></span>
                </div>
                <button @click="toggleSlideshow()" class="text-gray-400 hover:text-gray-600 dark:hover:text-white transition cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Slideshow Main -->
            <div class="flex-grow flex items-center justify-center relative p-4 md:p-12 min-h-[400px]">
                <button @click="prevSlide()" class="absolute left-4 p-4 text-gray-300 hover:text-blue-600 transition cursor-pointer z-10">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>

                <div class="max-w-full max-h-full flex items-center justify-center">
                    <template x-if="currentFile?.hasThumbnail">
                        <img :src="'/' + window.token + '/thumbnail/' + currentFile.fileId"
                             class="max-w-full max-h-[60vh] object-contain shadow-2xl rounded-lg" />
                    </template>
                    <template x-if="!currentFile?.hasThumbnail">
                        <img :src="'/' + window.token + '/icon/' + currentFile?.icon"
                             class="w-48 h-48 md:w-64 md:h-64 object-contain" />
                    </template>
                </div>

                <button @click="nextSlide()" class="absolute right-4 p-4 text-gray-300 hover:text-blue-600 transition cursor-pointer z-10">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>

            <!-- Slideshow Footer -->
            <div class="p-6 bg-gray-50 dark:bg-slate-900/50 border-t border-gray-100 dark:border-slate-800 flex flex-wrap justify-center gap-4">
                <a :href="'/' + window.token + '/file/' + currentFile?.fileId + '?download'"
                   target="_blank"
                   class="bg-white dark:bg-slate-800 text-gray-700 dark:text-white border border-gray-200 dark:border-slate-700 px-6 py-2 rounded-xl font-bold hover:bg-gray-100 dark:hover:bg-slate-700 transition">
                    Download
                </a>
                <a :href="'/' + window.token + '/file/' + currentFile?.fileId"
                   target="_blank"
                   class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/20">
                    Open Original
                </a>
                <div class="w-full text-center mt-2">
                    <span x-text="humanFileSize(currentFile?.size || 0)" class="text-xs font-mono text-gray-400"></span>
                </div>
            </div>
        </div>
    </template>
</div>

<footer class="mt-20 p-8 text-center text-gray-400 dark:text-slate-500 text-sm border-t border-gray-100 dark:border-slate-800">
    <p>Generated by <a href="{{appurl}}" class="text-blue-500 hover:underline">{{appname}}</a>.</p>
    <p class="mt-1">Icons provided by <a href="https://github.com/PapirusDevelopmentTeam/papirus-icon-theme" target="_blank" class="text-blue-500 hover:underline">Papirus Development Team</a>.</p>
</footer>

</body>
</html>
