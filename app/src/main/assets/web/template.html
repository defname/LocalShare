<!DOCTYPE html>
<!-- Part of LocalShare - https://github.com/defname/LocalShare -->
<html lang="en"
      x-data="{
        darkMode: localStorage.getItem('dark') === 'true' ||
                 (!('dark' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
      }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="generator" content="LocalShare">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{appname}} - Shared Files</title>
    <link rel="icon" type="image/png" href="/{{token}}/favicon">
    <link rel="stylesheet" href="/{{token}}/static/css/tailwind.css">
    <link rel="stylesheet" href="/{{token}}/static/css/lightgallery.css">

    <!-- LightGallery -->
    <script src="/{{token}}/static/js/lg/lightgallery.min.js"></script>
    <script src="/{{token}}/static/js/lg/lg-zoom.min.js"></script>
    <script src="/{{token}}/static/js/lg/lg-thumbnail.min.js"></script>
    <script src="/{{token}}/static/js/lg/lg-video.min.js"></script>

    <script defer src="/{{token}}/static/js/alpine.min.js"></script>
    <script src="/{{token}}/static/js/main.js"></script>

    <script>
        window.initialFiles = {{filelist}};
        window.token = '{{token}}';
    </script>
</head>

<!-- Hidden container required by LightGallery dynamic mode -->
<div id="lg-inline-container" style="display:none"></div>

<body x-data="fileManager(window.initialFiles, window.token)"
      x-init="initSSE()"
      class="bg-gray-50 text-gray-900 dark:bg-slate-950 dark:text-gray-100 font-sans transition-colors duration-300">

<header class="p-4 md:p-6 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between gap-2">
    <div class="flex items-center gap-3 min-w-0">
        <img src="/{{token}}/favicon/medium" alt="Logo" class="w-9 h-9 flex-shrink-0" />
        <h1 class="text-lg font-bold text-gray-800 dark:text-white truncate">{{appname}}</h1>
    </div>

    <div class="flex items-center gap-2 flex-shrink-0">
        <!-- Shared content sidebar toggle -->
        <button @click="toggleSidebar()"
                class="relative p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none cursor-pointer"
                title="Shared Content">
            <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
            </svg>
            <span x-show="hasNewSharedContent" class="absolute top-1 right-1 flex h-2.5 w-2.5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
            </span>
        </button>

        <!-- Dark mode toggle -->
        <button @click="darkMode = !darkMode; localStorage.setItem('dark', darkMode)"
                class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors focus:outline-none cursor-pointer"
                title="Toggle dark mode">
            <svg x-show="darkMode" class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
            </svg>
            <svg x-show="!darkMode" class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
        </button>

        <!-- I'm Done button -->
        <button @click="doneSharing()"
                class="hidden sm:inline-flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800 hover:bg-red-100 dark:hover:bg-red-900/40 transition cursor-pointer"
                title="End your access to this session">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Done
        </button>
    </div>
</header>

<div class="max-w-6xl mx-auto p-3 md:p-6">

    <!-- Toolbar -->
    <div class="flex flex-wrap justify-between items-center mb-5 gap-3 bg-white dark:bg-slate-900 p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800">
        <div class="flex items-center gap-2 flex-wrap">
            <select x-model="sortKey"
                    class="bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-sm rounded-lg p-2 focus:ring-blue-500 dark:text-white">
                <option value="filename">Name</option>
                <option value="size">Size</option>
                <option value="mimeType">Type</option>
            </select>
            <button @click="sortAsc = !sortAsc"
                    class="p-2 bg-gray-100 dark:bg-slate-800 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 transition text-sm"
                    :title="sortAsc ? 'Sort descending' : 'Sort ascending'">
                <span x-text="sortAsc ? '↓' : '↑'" class="dark:text-white font-bold"></span>
            </button>

            <div class="h-5 w-px bg-gray-200 dark:bg-slate-700"></div>

            <button @click="showGrid()"
                    :class="isGrid ? 'text-blue-600 bg-blue-50 dark:bg-blue-900/40' : 'text-gray-500 dark:text-gray-400'"
                    class="p-2 rounded-lg font-medium cursor-pointer transition hover:bg-gray-100 dark:hover:bg-slate-800"
                    title="Grid view">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
            </button>
            <button @click="showList()"
                    :class="isList ? 'text-blue-600 bg-blue-50 dark:bg-blue-900/40' : 'text-gray-500 dark:text-gray-400'"
                    class="p-2 rounded-lg font-medium cursor-pointer transition hover:bg-gray-100 dark:hover:bg-slate-800"
                    title="List view">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
            </button>
        </div>

        <a x-show="files.length > 0"
           :href="'/' + window.token + '/?download'"
           class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-500/20 whitespace-nowrap">
            ↓ Download All (ZIP)
        </a>
    </div>

    <!-- Empty state -->
    <div x-show="files.length === 0"
         class="flex flex-col items-center justify-center py-24 text-gray-400 dark:text-slate-500">
        <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/>
        </svg>
        <p class="text-lg font-semibold">No files shared yet</p>
        <p class="text-sm mt-1">The device owner hasn't shared any files.</p>
    </div>

    <!-- Grid View -->
    <ul x-show="isGrid && files.length > 0"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 list-none p-0">
        <template x-for="(file, index) in sortedFiles" :key="file.fileId">
            <li class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden flex flex-col group">
                <!-- Thumbnail / preview area -->
                <div @click="openPreview(index)"
                     class="h-36 bg-gray-50 dark:bg-slate-800 flex items-center justify-center cursor-pointer overflow-hidden relative">
                    <img :src="'/' + window.token + '/icon/' + file.icon"
                         x-init="loadThumbnail($el, file)"
                         class="w-16 h-16 p-2 object-contain transition-transform duration-300 group-hover:scale-105" />
                    <!-- Play badge for videos -->
                    <div x-show="file.mimeType && file.mimeType.startsWith('video/')"
                         class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/20 transition">
                        <div class="w-10 h-10 rounded-full bg-white/80 flex items-center justify-center shadow">
                            <svg class="w-5 h-5 text-gray-800 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- File info and actions -->
                <div class="p-3 flex flex-col flex-grow">
                    <span x-text="file.filename"
                          :title="file.filename"
                          class="font-semibold text-gray-900 dark:text-white text-sm truncate block mb-0.5"></span>
                    <span x-text="humanFileSize(file.size)"
                          class="text-xs text-gray-400 dark:text-slate-500 font-mono mb-3"></span>

                    <div class="mt-auto flex items-center gap-1.5 justify-end">
                        <button @click="copyLink(file.fileId)"
                                class="p-1.5 rounded-lg bg-gray-100 dark:bg-slate-800 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-700 transition cursor-pointer"
                                title="Copy link">
                            <svg x-show="copiedId !== file.fileId" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                            </svg>
                            <svg x-show="copiedId === file.fileId" class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                        </button>
                        <a :href="'/' + window.token + '/file/' + file.fileId + '?download'"
                           class="text-[10px] uppercase tracking-wider bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 px-2.5 py-1.5 rounded-lg font-bold hover:bg-gray-200 dark:hover:bg-slate-700 transition"
                           :download="file.filename">Save</a>
                        <a :href="'/' + window.token + '/file/' + file.fileId"
                           class="text-[10px] uppercase tracking-wider bg-blue-600 text-white px-2.5 py-1.5 rounded-lg font-bold hover:bg-blue-700 transition"
                           target="_blank">Open</a>
                    </div>
                </div>
            </li>
        </template>
    </ul>

    <!-- List View -->
    <ul x-show="isList && files.length > 0" class="flex flex-col space-y-2 list-none p-0">
        <template x-for="(file, index) in sortedFiles" :key="file.fileId">
            <li class="bg-white dark:bg-slate-900 px-3 py-2.5 md:px-4 rounded-xl border border-gray-100 dark:border-slate-800 flex items-center gap-3 shadow-sm">
                <div @click="openPreview(index)"
                     class="w-10 h-10 bg-gray-50 dark:bg-slate-800 rounded-lg flex-shrink-0 flex items-center justify-center cursor-pointer overflow-hidden group">
                    <img :src="'/' + window.token + '/icon/' + file.icon"
                         x-init="loadThumbnail($el, file)"
                         class="w-7 h-7 object-contain group-hover:scale-110 transition-transform" />
                </div>

                <div class="flex-grow min-w-0 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-4 items-center">
                    <span x-text="file.filename" :title="file.filename"
                          class="font-semibold text-sm text-gray-900 dark:text-white truncate"></span>
                    <span x-text="humanFileSize(file.size)"
                          class="text-xs text-gray-400 dark:text-slate-500 font-mono hidden sm:block"></span>
                    <span x-text="file.mimeType"
                          class="text-xs text-gray-400 dark:text-slate-500 truncate hidden md:block"></span>
                </div>

                <div class="flex items-center gap-1.5 flex-shrink-0">
                    <button @click="copyLink(file.fileId)"
                            class="p-1.5 rounded-lg bg-gray-100 dark:bg-slate-800 text-gray-500 hover:bg-gray-200 dark:hover:bg-slate-700 transition cursor-pointer"
                            title="Copy link">
                        <svg x-show="copiedId !== file.fileId" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                        </svg>
                        <svg x-show="copiedId === file.fileId" class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </button>
                    <a :href="'/' + window.token + '/file/' + file.fileId + '?download'"
                       class="text-[10px] uppercase tracking-wider bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 px-2.5 py-1.5 rounded-lg font-bold hover:bg-gray-200 dark:hover:bg-slate-700 transition"
                       :download="file.filename">Save</a>
                    <a :href="'/' + window.token + '/file/' + file.fileId"
                       class="text-[10px] uppercase tracking-wider bg-blue-600 text-white px-2.5 py-1.5 rounded-lg font-bold hover:bg-blue-700 transition"
                       target="_blank">Open</a>
                </div>
            </li>
        </template>
    </ul>
</div>

<footer class="mt-16 p-6 text-center text-gray-400 dark:text-slate-500 text-xs border-t border-gray-100 dark:border-slate-800">
    <!-- Mobile "I'm Done" button -->
    <button @click="doneSharing()"
            class="sm:hidden mb-4 inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-semibold bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800">
        End Session
    </button>
    <p>Shared via <a href="{{appurl}}" class="text-blue-500 hover:underline font-medium">{{appname}}</a></p>
    <div class="mt-3 flex flex-wrap justify-center items-center gap-y-2 opacity-75">
        <span>Icons by <a href="https://github.com/PapirusDevelopmentTeam/papirus-icon-theme" target="_blank" class="hover:text-blue-500 underline">Papirus Team</a></span>
        <span class="text-gray-300 dark:text-slate-700 mx-2">•</span>
        <span>Gallery by <a href="https://www.lightgalleryjs.com/" target="_blank" class="hover:text-blue-500 underline">LightGallery</a></span>
        <span class="text-gray-300 dark:text-slate-700 mx-2">•</span>
        <span>Built with <a href="https://alpinejs.dev/" target="_blank" class="hover:text-blue-500 underline">Alpine.js</a> & <a href="https://tailwindcss.com/" target="_blank" class="hover:text-blue-500 underline">Tailwind CSS</a></span>
    </div>
</footer>

<!-- Sidebar Overlay -->
<div x-show="sidebarOpen" class="fixed inset-0 z-50 overflow-hidden" style="display:none;">
    <div x-show="sidebarOpen"
         x-transition:enter="ease-in-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in-out duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="sidebarOpen = false"
         class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity">
    </div>

    <div x-show="sidebarOpen"
         x-transition:enter="transform transition ease-in-out duration-300"
         x-transition:enter-start="-translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transform transition ease-in-out duration-300"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="-translate-x-full"
         class="fixed inset-y-0 left-0 w-full max-w-sm bg-white dark:bg-slate-900 shadow-2xl border-r border-gray-200 dark:border-slate-800 flex flex-col">

        <div class="p-5 border-b border-gray-100 dark:border-slate-800 flex items-center justify-between">
            <h2 class="text-lg font-bold text-gray-800 dark:text-white">Shared Content</h2>
            <button @click="sidebarOpen = false" class="text-gray-400 hover:text-gray-600 dark:hover:text-white transition p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <template x-for="item in sharedContent" :key="item.id">
                <div class="bg-gray-50 dark:bg-slate-800/50 p-4 rounded-xl border border-gray-100 dark:border-slate-700">
                    <div class="flex items-start gap-3">
                        <div class="flex-1 min-w-0">
                            <template x-if="item.mimeType !== 'text/plain'">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-[10px] uppercase font-bold tracking-wider text-blue-500" x-text="item.mimeType"></span>
                                    <template x-if="item.label">
                                        <span class="text-[10px] font-bold text-gray-500" x-text="item.label"></span>
                                    </template>
                                </div>
                            </template>
                            <template x-if="item.mimeType === 'text/plain'">
                                <p class="text-sm text-gray-800 dark:text-gray-200 break-words whitespace-pre-wrap" x-text="item.text"></p>
                            </template>
                            <template x-if="item.mimeType !== 'text/plain'">
                                <pre class="text-xs text-gray-700 dark:text-gray-300 bg-white/50 dark:bg-slate-900/50 p-2 rounded border border-gray-100 dark:border-slate-800 overflow-x-auto font-mono whitespace-pre-wrap" x-text="item.data"></pre>
                            </template>
                        </div>
                        <button @click="copyToClipboard(item.text || item.data)"
                                class="flex-shrink-0 p-2 bg-white dark:bg-slate-700 shadow-sm border border-gray-100 dark:border-slate-600 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-600 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>

            <div x-show="sharedContent.length === 0"
                 class="flex flex-col items-center justify-center py-16 text-gray-400">
                <svg class="w-10 h-10 mb-2 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <p class="text-sm">No shared content.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
